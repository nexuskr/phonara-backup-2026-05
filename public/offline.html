<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Phonara — 오프라인 / Offline</title>
<style>
  :root { color-scheme: dark; }
  html,body{height:100%;margin:0;background:#0a0a12;color:#f4e9c8;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
  .wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;}
  .crown{font-size:40px;margin-bottom:16px;filter:drop-shadow(0 0 24px #f5c14288);}
  h1{font-size:22px;margin:0 0 8px;font-weight:900;letter-spacing:.04em;background:linear-gradient(135deg,#fde68a,#f5c142);-webkit-background-clip:text;background-clip:text;color:transparent;}
  p{margin:6px 0;font-size:14px;opacity:.85;line-height:1.6;max-width:360px;}
  .sep{width:48px;height:1px;background:linear-gradient(90deg,transparent,#f5c14266,transparent);margin:18px 0;}
  button{margin-top:18px;min-height:48px;padding:0 22px;border-radius:14px;border:1px solid #f5c14266;background:linear-gradient(135deg,#fde68a,#f5c142);color:#1a1208;font-weight:800;font-size:14px;letter-spacing:.06em;}
</style>
</head>
<body>
<div class="wrap">
  <div class="crown">👑</div>
  <h1 id="t-ko">연결이 끊어졌습니다</h1>
  <p id="d-ko">네트워크가 복구되면 황실 금고에 자동으로 다시 연결됩니다.</p>
  <div class="sep"></div>
  <h1 id="t-en">You are offline</h1>
  <p id="d-en">We will reconnect to the Imperial Treasury as soon as your network returns.</p>
  <button onclick="location.reload()">↻ 다시 시도 / Retry</button>
</div>
<script>
  try{
    var l=(localStorage.getItem('phonara-lang')||navigator.language||'ko').toLowerCase().slice(0,2);
    document.documentElement.lang = l==='en' ? 'en' : 'ko';
  }catch(e){}
</script>
</body>
</html>
